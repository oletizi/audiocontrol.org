[build]
  command = "npm run build:audiocontrol"
  publish = "dist/audiocontrol"

# Sitemap alias
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301

# Proxy Roland S-series editor to its dedicated Netlify app
[[redirects]]
  from = "/roland/s330/editor"
  to = "https://roland-sxx0-editor.netlify.app/"
  status = 200
  force = true

[[redirects]]
  from = "/roland/s330/editor/"
  to = "https://roland-sxx0-editor.netlify.app/"
  status = 200
  force = true

[[redirects]]
  from = "/roland/s330/editor/*"
  to = "https://roland-sxx0-editor.netlify.app/:splat"
  status = 200
  force = true

# Proxy S-550 editor to Roland S-series Netlify app
[[redirects]]
  from = "/roland/s550/editor"
  to = "https://roland-sxx0-editor.netlify.app/"
  status = 200
  force = true

[[redirects]]
  from = "/roland/s550/editor/"
  to = "https://roland-sxx0-editor.netlify.app/"
  status = 200
  force = true

[[redirects]]
  from = "/roland/s550/editor/*"
  to = "https://roland-sxx0-editor.netlify.app/:splat"
  status = 200
  force = true
