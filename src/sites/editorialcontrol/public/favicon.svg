<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Publication-ink background (hsl 215 22% 7%) — matches the
       site's dark background token. -->
  <rect width="16" height="16" fill="#0D1014"/>
  <!-- Signal-green chartreuse filled diamond (hsl 74 82% 58%).
       The ◆ glyph is the publication's signature marker — used in
       the tagline ("◆A publication on building with AI agents") and
       in the disposition-stamp UI on the review surface. Reusing it
       as the brand mark keeps the sites consistent: audiocontrol has
       its pixel-art A, editorialcontrol has the diamond. -->
  <polygon points="8,2 14,8 8,14 2,8" fill="#C6E839"/>
</svg>
