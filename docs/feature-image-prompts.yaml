version: 1
templates:
  - slug: crystal-amber
    name: Isometric Crystal (amber)
    description: Warm-toned twin of crystal-teal. Same geometric language but amber-dominant. Pair with crystal-teal when a post contrasts two perspectives or alternatives.
    tags:
      - ai
      - process
      - systems
      - architecture
      - workflow
      - geometric
      - warm
    prompt: Abstract geometric data visualization, single translucent isometric crystal structure of stacked layered panels, dominantly warm amber orange tones with subtle teal accent edges, fading into deep shadow background, thin glowing wireframe lines tracing through the structure, minimalist editorial illustration style, dark moody atmosphere, no objects no people no text no words no letters no typography no labels
    preset: retro-crt
    provider: flux
    parent: crystal-teal
    examples: []
  - slug: crystal-teal
    name: Isometric Crystal (teal)
    description: Translucent isometric crystal structure of stacked layered panels, teal-dominant. Conveys "framework" or "structure" — good for AI/agent, process, systems-thinking, or architecture posts. Pairs with retro-crt.
    tags:
      - ai
      - process
      - systems
      - architecture
      - workflow
      - geometric
    prompt: Abstract geometric data visualization, single translucent isometric crystal structure of stacked layered panels, dominantly cool teal cyan tones with subtle amber accent edges, fading into deep shadow background, thin glowing wireframe lines tracing through the structure, minimalist editorial illustration style, dark moody atmosphere, no objects no people no text no words no letters no typography no labels
    preset: retro-crt
    provider: flux
    examples: []
  - slug: cubiste-nouveau
    name: cubiste-nouveau
    description: Um... when you want something abstract and intersting, with a cubist meets art nouveau flavor
    tags: []
    prompt: Irregular cluster of geometric panels at varied scales and orientations — a loose population of candidates under selection pressure, not arranged on a grid. Flat vector style with subtle gradients. Muted palette of deep indigo, teal, and warm off-white. Organic spacing, overlapping shapes at slight angles, some panels fading at their edges. Minimal lines, no text, no literal machinery or AI imagery. Slight grain texture. Evokes iteration, refinement, and organic variation without being on-the-nose.
    preset: retro-crt
    provider: dom-bake
    examples:
      - 9e1b865a-1e2a-49e0-b45b-8b9e0007e445
  - slug: data-packet-network
    name: Data Packet Network
    description: Layered translucent data packets flowing through a wireframe node network. Suggests investigation, protocol analysis, signal tracing. Good for debugging, reverse engineering, networking, and protocol deep-dive posts.
    tags:
      - debugging
      - reverse-engineering
      - protocol
      - networking
      - scsi
      - midi
      - investigation
    prompt: Abstract isometric illustration of layered translucent data packets flowing through a network of glowing wireframe nodes, cool teal cyan dominant with warm amber accent highlights on connection lines, deep shadow background suggesting intense focused analysis, thin glowing trace lines weaving between the nodes, minimalist editorial style, dark moody atmosphere, no objects no people no text no words no letters no typography no labels
    preset: retro-crt
    provider: flux
    examples:
      - ed8b6e7f-582c-4d0e-8759-8c947802176c
  - slug: stacked-panels-receding
    name: Stacked Panels Receding
    description: Isometric grid of translucent panels receding into deep teal shadow, with thin amber accent lines tracing a path. Conveys accumulation or sequence — good for long-form retrospectives, session journals, or multi-step analyses.
    tags:
      - retrospective
      - analysis
      - process
      - narrative
      - geometric
    prompt: Abstract geometric data visualization, isometric grid of stacked translucent panels receding into deep teal shadow, thin amber accent lines tracing a path through the panels, minimalist editorial illustration style, dark moody background, subtle depth, no objects no people no text no words no letters no typography no labels
    preset: retro-crt
    provider: flux
    examples: []
